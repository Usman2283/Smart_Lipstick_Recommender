<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lipstick Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 30px;
            gap: 30px;
        }

        .upload-section {
            flex: 1;
            min-width: 300px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #ff6b6b;
            background: #f9f9f9;
        }

        .upload-area.dragover {
            border-color: #ff6b6b;
            background: #f0f0f0;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: #ff6b6b;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .upload-btn:hover {
            transform: scale(1.05);
        }

        .image-preview {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .results-section {
            flex: 1;
            min-width: 300px;
            display: none;
        }

        .skin-tone-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .skin-tone-card h3 {
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .skin-tone-value {
            font-size: 2em;
            font-weight: bold;
        }

        .recommendations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .lipstick-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .lipstick-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        .lipstick-color {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 3px solid #ddd;
        }

        .lipstick-name {
            font-weight: bold;
            margin: 10px 0 5px;
        }

        .lipstick-desc {
            font-size: 0.9em;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💄 Smart Lipstick Recommender</h1>
            <p>Upload your photo to get personalized lipstick recommendations based on your skin tone</p>
        </div>

        <div class="content">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <p>Drag & drop your photo here or click to upload</p>
                    <p style="font-size: 0.9em; margin-top: 10px; color: #999;">Supports: JPG, PNG, GIF</p>
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose
                        File</button>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                </div>
                <div class="image-preview" id="imagePreview">
                    <img id="previewImg" alt="Preview">
                </div>
                <div class="error" id="errorMsg"></div>
            </div>

            <div class="results-section" id="resultsSection">
                <div class="skin-tone-card">
                    <h3>Detected Skin Tone</h3>
                    <div class="skin-tone-value" id="skinToneValue">-</div>
                </div>
                <h3>💋 Recommended Lipstick Shades</h3>
                <div class="recommendations" id="recommendations"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your skin tone...</p>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const imagePreview = document.getElementById('imagePreview');
        const resultsSection = document.getElementById('resultsSection');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const skinToneValue = document.getElementById('skinToneValue');
        const recommendationsDiv = document.getElementById('recommendations');

        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            // Validate file type
            if (!file.type.match('image.*')) {
                showError('Please upload an image file');
                return;
            }

            // Preview image
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);

            // Upload to server
            uploadImage(file);
        }

        async function uploadImage(file) {
            showLoading();
            hideError();

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showResults(data);
                } else {
                    showError(data.error || 'Something went wrong');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                hideLoading();
            }
        }

        function showResults(data) {
            skinToneValue.textContent = data.skin_tone;

            recommendationsDiv.innerHTML = '';
            data.recommendations.forEach(shade => {
                const card = document.createElement('div');
                card.className = 'lipstick-card';
                card.innerHTML = `
                    <div class="lipstick-color" style="background-color: ${shade.code};"></div>
                    <div class="lipstick-name">${shade.name}</div>
                    <div class="lipstick-desc">${shade.description}</div>
                `;
                recommendationsDiv.appendChild(card);
            });

            resultsSection.style.display = 'block';
        }

        function showLoading() {
            loading.style.display = 'block';
            resultsSection.style.display = 'none';
        }

        function hideLoading() {
            loading.style.display = 'none';
        }

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }
    </script>
</body>

</html>
